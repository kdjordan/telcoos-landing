<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TelcoOS — Agentic VOIP Traffic Manager</title>
  <meta name="description" content="TelcoOS is an agentic VOIP traffic manager — routing, rates, and reporting unified into one intelligent workspace." />
  <meta property="og:title" content="TelcoOS" />
  <meta property="og:description" content="Agentic VOIP Traffic Manager." />
  <meta property="og:type" content="website" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230a0b0e'/><circle cx='50' cy='50' r='20' fill='none' stroke='%2334e0c4' stroke-width='6'/><circle cx='50' cy='50' r='6' fill='%2334e0c4'/></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #08090c;
      --fg: #f4f6f8;
      --muted: #8b94a3;
      --accent: #34e0c4;
      --line: rgba(255, 255, 255, 0.08);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--fg);
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      position: relative;
    }
    /* ambient signal glow */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(60rem 40rem at 70% -10%, rgba(52, 224, 196, 0.10), transparent 60%),
        radial-gradient(50rem 40rem at -10% 110%, rgba(79, 124, 255, 0.08), transparent 60%);
      pointer-events: none;
      z-index: 0;
    }
    /* faint grid */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 64px 64px;
      mask-image: radial-gradient(70% 70% at 50% 40%, #000 30%, transparent 100%);
      -webkit-mask-image: radial-gradient(70% 70% at 50% 40%, #000 30%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }
    .wrap {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 64rem;
      width: 100%;
      margin: 0 auto;
      padding: 2.5rem 1.75rem;
    }
    header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .mark {
      width: 1.5rem; height: 1.5rem;
      display: grid; place-items: center;
    }
    .mark svg { display: block; }
    .brand {
      font-family: "Unbounded", sans-serif;
      font-weight: 700;
      font-size: 1.15rem;
      letter-spacing: -0.01em;
    }
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 4rem 0;
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.75rem;
    }
    .eyebrow::before {
      content: "";
      width: 0.5rem; height: 0.5rem;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(52, 224, 196, 0.18);
    }
    h1 {
      font-family: "Unbounded", sans-serif;
      font-weight: 700;
      font-size: clamp(2.6rem, 7vw, 5rem);
      line-height: 1.02;
      letter-spacing: -0.03em;
      max-width: 14ch;
    }
    h1 .accent { color: var(--accent); }
    p.lede {
      margin-top: 1.6rem;
      font-size: clamp(1.05rem, 2.2vw, 1.3rem);
      line-height: 1.55;
      color: var(--muted);
      max-width: 46ch;
    }
    .cta {
      margin-top: 2.75rem;
      display: flex;
      align-items: center;
      gap: 1.25rem;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.85rem 1.4rem;
      border-radius: 0.7rem;
      background: var(--accent);
      color: #04221d;
      font-weight: 500;
      font-size: 0.98rem;
      text-decoration: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 0 0 0 rgba(52, 224, 196, 0.4);
    }
    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 28px -8px rgba(52, 224, 196, 0.55);
    }
    .btn svg { transition: transform 0.15s ease; }
    .btn:hover svg { transform: translateX(2px); }
    footer {
      position: relative;
      z-index: 1;
      border-top: 1px solid var(--line);
      padding: 1.5rem 1.75rem;
      max-width: 64rem;
      width: 100%;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 0.85rem;
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--fg); }
    @media (max-width: 600px) {
      .wrap { padding: 2rem 1.25rem; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <span class="mark" aria-hidden="true">
        <svg width="24" height="24" viewBox="0 0 100 100"><circle cx="50" cy="50" r="20" fill="none" stroke="#34e0c4" stroke-width="7"/><circle cx="50" cy="50" r="7" fill="#34e0c4"/></svg>
      </span>
      <span class="brand">TelcoOS</span>
    </header>

    <main>
      <span class="eyebrow">Agentic VOIP Traffic Manager</span>
      <h1>Your VOIP traffic, <span class="accent">run by an agent.</span></h1>
      <p class="lede">
        TelcoOS unifies routing, rates, and reporting into one intelligent
        workspace — so the busywork of moving telecom traffic runs itself,
        and you focus on the deals.
      </p>
      <div class="cta">
        <a class="btn" href="mailto:k.dean.jordan@gmail.com">
          Get in touch
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        </a>
      </div>
    </main>
  </div>

  <footer>
    <span>&copy; 2026 TelcoOS</span>
    <a href="mailto:k.dean.jordan@gmail.com">k.dean.jordan@gmail.com</a>
  </footer>
</body>
</html>
